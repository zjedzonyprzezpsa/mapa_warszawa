<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warszawa Transport - Live Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --mza: #e31e24; --mobilis: #f39c12; --relobus: #2ecc71; --pks: #9b59b6;
            --bg: #f8f9fa;
        }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
        
        #map { flex: 7; width: 100%; border-bottom: 4px solid #ccc; }
        #data-panel { flex: 3; width: 100%; overflow-y: auto; background: white; }

        .control-panel {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95); 
            padding: 20px; 
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); 
            width: 280px; 
            border: 1px solid #ddd;
        }

        h2 { margin: 0 0 15px 0; font-size: 20px; color: #1a1a1a; }

        .carrier-item { 
            display: flex; 
            align-items: center; 
            margin-bottom: 12px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer;
        }

        .carrier-item input { 
            margin-right: 12px; 
            transform: scale(1.5); 
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 10px; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        thead { background: #222; color: white; position: sticky; top: 0; z-index: 10; }
        th, td { padding: 10px 15px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #f1f1f1; cursor: pointer; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; color: white; text-transform: uppercase; }
        
        #status-bar { 
            font-size: 12px; 
            color: #555; 
            margin-top: 15px; 
            border-top: 1px solid #eee; 
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
        }
        .demo-tag { color: #856404; background: #fff3cd; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="control-panel">
    <h2>Flota Warszawy</h2>
    
    <label class="carrier-item">
        <input type="checkbox" id="mza" checked> 
        <span class="dot" style="background:var(--mza)"></span> MZA
    </label>
    <label class="carrier-item">
        <input type="checkbox" id="mobilis" checked> 
        <span class="dot" style="background:var(--mobilis)"></span> MOBILIS
    </label>
    <label class="carrier-item">
        <input type="checkbox" id="relobus" checked> 
        <span class="dot" style="background:var(--relobus)"></span> RELOBUS
    </label>
    <label class="carrier-item">
        <input type="checkbox" id="pks" checked> 
        <span class="dot" style="background:var(--pks)"></span> PKS GRODZISK
    </label>
    
    <div id="status-bar">
        <span>Status: <b id="status-text">Ładowanie...</b></span>
        <span id="update-timer"></span>
    </div>
</div>

<div id="map"></div>

<div id="data-panel">
    <table id="bus-table">
        <thead>
            <tr>
                <th>Linia</th>
                <th>Numer</th>
                <th>Przewoźnik</th>
                <th>Współrzędne</th>
                <th>Czas</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- KONFIGURACJA ---
    const API_KEY = 'c5d9cb44-694b-4f0b-965d-7ad3d57533da'; 
    const map = L.map('map').setView([52.23, 21.01], 12);
    let markers = {};

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    const CARRIERS = {
        mza: { name: 'MZA Warszawa', color: '#e31e24' },
        mobilis: { name: 'Mobilis', color: '#f39c12' },
        relobus: { name: 'Relobus', color: '#2ecc71' },
        pks: { name: 'PKS Grodzisk', color: '#9b59b6' }
    };

    function identifyCarrier(nr) {
        const sNr = nr.toString();
        if (/^[1-8]\d{3}$/.test(sNr)) return 'mza';
        if (/^(92|94|95|98)\d{2}$/.test(sNr)) return 'mobilis';
        if (/^(97|99)\d{2}$/.test(sNr)) return 'relobus';
        if (/^(90|93|96)\d{2}$/.test(sNr)) return 'pks'; // 93 przypisane do PKS
        return null;
    }

    function getDemoData() {
        const demo = [];
        const lines = ['180', '503', '116', '523', '190', '709'];
        const types = ['mza', 'mobilis', 'relobus', 'pks'];
        for(let i=0; i<20; i++) {
            const type = types[i % 4];
            const baseNr = {mza:'54', mobilis:'92', relobus:'99', pks:'93'}[type];
            demo.push({
                VehicleNumber: baseNr + (10 + i),
                Lines: lines[i % lines.length],
                Lat: 52.18 + (Math.random() * 0.12),
                Lon: 20.94 + (Math.random() * 0.18),
                Time: new Date().toLocaleTimeString()
            });
        }
        return demo;
    }

    async function updateData() {
        let buses = [];
        // Używamy corsproxy.io aby ominąć blokady CORS na GitHubie
        const apiUrl = `https://api.um.warszawa.pl/api/action/busestrams_get/?resource_id=f2e5503e-927d-4ad3-9500-4ab9e55deb59&apikey=${API_KEY}&type=1`;
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`;

        try {
            const res = await fetch(proxyUrl);
            if (!res.ok) throw new Error("Błąd sieci");
            const data = await res.json();
            
            if (data.result && Array.isArray(data.result) && data.result.length > 0) {
                buses = data.result;
                document.getElementById('status-text').innerText = "LIVE";
            } else {
                throw new Error("Brak aktywnych pojazdów");
            }
        } catch (e) {
            console.warn("Przełączanie na DEMO:", e.message);
            buses = getDemoData();
            document.getElementById('status-text').innerHTML = '<span class="demo-tag">DEMO</span>';
        }

        const activeFilter = {
            mza: document.getElementById('mza').checked,
            mobilis: document.getElementById('mobilis').checked,
            relobus: document.getElementById('relobus').checked,
            pks: document.getElementById('pks').checked
        };

        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = ''; 
        const currentIds = new Set();

        buses.forEach(bus => {
            const carrierId = identifyCarrier(bus.VehicleNumber);
            if (carrierId && activeFilter[carrierId]) {
                currentIds.add(bus.VehicleNumber);
                const carrier = CARRIERS[carrierId];
                const pos = [bus.Lat, bus.Lon];

                if (markers[bus.VehicleNumber]) {
                    markers[bus.VehicleNumber].setLatLng(pos);
                } else {
                    markers[bus.VehicleNumber] = L.circleMarker(pos, {
                        radius: 7, fillColor: carrier.color, color: '#fff', weight: 2, fillOpacity: 0.9
                    }).addTo(map).bindPopup(`<b>Linia ${bus.Lines}</b><br>${carrier.name}<br>Nr: ${bus.VehicleNumber}`);
                }

                const row = tableBody.insertRow();
                row.innerHTML = `
                    <td><b>${bus.Lines}</b></td>
                    <td>#${bus.VehicleNumber}</td>
                    <td><span class="badge" style="background:${carrier.color}">${carrier.name}</span></td>
                    <td style="color:#666">${parseFloat(bus.Lat).toFixed(3)}, ${parseFloat(bus.Lon).toFixed(3)}</td>
                    <td>${bus.Time.includes(' ') ? bus.Time.split(' ')[1] : bus.Time}</td>
                `;
                row.onclick = () => {
                    map.setView(pos, 15);
                    markers[bus.VehicleNumber].openPopup();
                };
            }
        });

        Object.keys(markers).forEach(id => {
            if (!currentIds.has(id)) {
                map.removeLayer(markers[id]);
                delete markers[id];
            }
        });

        document.getElementById('update-timer').innerText = new Date().toLocaleTimeString();
    }

    setInterval(updateData, 15000); // Odświeżanie co 15 sekund
    updateData();
    document.querySelectorAll('input').forEach(i => i.onchange = updateData);
</script>
</body>
</html>
