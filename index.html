<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warszawa Transport - Pro Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --mza: #e31e24; --mobilis: #f39c12; --relobus: #2ecc71; --pks: #9b59b6;
            --bg: #f8f9fa;
        }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
        
        /* Layout */
        #map { flex: 7; width: 100%; border-bottom: 4px solid #ccc; }
        #data-panel { flex: 3; width: 100%; overflow-y: auto; background: white; }

        /* Panel Sterowania */
        .control-panel {
            position: absolute; 
            top: 25px; 
            right: 25px; 
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95); 
            padding: 25px; 
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3); 
            width: 320px; 
            border: 1px solid #ddd;
        }

        h2 { margin: 0 0 20px 0; font-size: 22px; color: #1a1a1a; }

        .carrier-item { 
            display: flex; 
            align-items: center; 
            margin-bottom: 15px; 
            font-size: 18px; 
            font-weight: 600; 
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .carrier-item:hover { background: #f0f0f0; }

        .carrier-item input { 
            margin-right: 15px; 
            transform: scale(1.8); 
            cursor: pointer; 
        }

        .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin-right: 12px; }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; font-size: 15px; text-align: left; }
        thead { background: #222; color: white; position: sticky; top: 0; z-index: 10; }
        th, td { padding: 12px 20px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #f1f1f1; cursor: pointer; }
        
        .badge { padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; color: white; text-transform: uppercase; }
        
        #status-bar { 
            font-size: 13px; 
            color: #555; 
            margin-top: 20px; 
            border-top: 2px solid #eee; 
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
        }
        .demo-tag { color: #856404; background: #fff3cd; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="control-panel">
    <h2>Flota Warszawy</h2>
    
    <label class="carrier-item">
        <input type="checkbox" id="mza" checked> 
        <span class="dot" style="background:var(--mza)"></span> MZA
    </label>
    <label class="carrier-item">
        <input type="checkbox" id="mobilis" checked> 
        <span class="dot" style="background:var(--mobilis)"></span> MOBILIS
    </label>
    <label class="carrier-item">
        <input type="checkbox" id="relobus" checked> 
        <span class="dot" style="background:var(--relobus)"></span> RELOBUS
    </label>
    <label class="carrier-item">
        <input type="checkbox" id="pks" checked> 
        <span class="dot" style="background:var(--pks)"></span> PKS GRODZISK
    </label>
    
    <div id="status-bar">
        <span>Status: <b id="status-text">Ładowanie...</b></span>
        <span id="update-timer"></span>
    </div>
</div>

<div id="map"></div>

<div id="data-panel">
    <table id="bus-table">
        <thead>
            <tr>
                <th>Linia</th>
                <th>Numer</th>
                <th>Przewoźnik</th>
                <th>Współrzędne</th>
                <th>Czas</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- KONFIGURACJA ---
    const API_KEY = 'c5d9cb44-694b-4f0b-965d-7ad3d57533da'; 
    const map = L.map('map').setView([52.23, 21.01], 12);
    let markers = {};

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    const CARRIERS = {
        mza: { name: 'MZA Warszawa', color: '#e31e24' },
        mobilis: { name: 'Mobilis', color: '#f39c12' },
        relobus: { name: 'Relobus', color: '#2ecc71' },
        pks: { name: 'PKS Grodzisk', color: '#9b59b6' }
    };

    // --- POPRAWIONA IDENTYFIKACJA ---
    function identifyCarrier(nr) {
        const sNr = nr.toString();
        // MZA: 1000-8999
        if (/^[1-8]\d{3}$/.test(sNr)) return 'mza';
        // MOBILIS: 92xx, 94xx, 95xx, 98xx
        if (/^(92|94|95|98)\d{2}$/.test(sNr)) return 'mobilis';
        // RELOBUS: 97xx, 99xx
        if (/^(90|99)\d{2}$/.test(sNr)) return 'relobus';
        // PKS GRODZISK: 90xx, 93xx, 96xx (Poprawione 93)
        if (/^(93)\d{2}$/.test(sNr)) return 'pks';
        
        return null;
    }

    function getDemoData() {
        const demo = [];
        const lines = ['180', '503', '116', '523', '190', '709'];
        const types = ['mza', 'mobilis', 'relobus', 'pks'];
        
        for(let i=0; i<40; i++) {
            const type = types[i % 4];
            // Poprawione bazy dla trybu DEMO
            const baseNr = {mza:'54', mobilis:'92', relobus:'99', pks:'93'}[type];
            demo.push({
                VehicleNumber: baseNr + (10 + i),
                Lines: lines[i % lines.length],
                Lat: 52.18 + (Math.random() * 0.12),
                Lon: 20.94 + (Math.random() * 0.18),
                Time: new Date().toLocaleTimeString()
            });
        }
        return demo;
    }

    async function updateData() {
        let buses = [];
        try {
            if (API_KEY === 'TWÓJ_KLUCZ_API') throw new Error("demo");
            const res = await fetch(`https://api.um.warszawa.pl/api/action/busestrams_get/?resource_id=f2e5503e-927d-4ad3-9500-4ab9e55deb59&apikey=${API_KEY}&type=1`);
            const data = await res.json();
            if (data.error || !data.result || data.result.length === 0) throw new Error("demo");
            buses = data.result;
            document.getElementById('status-text').innerText = "LIVE";
        } catch (e) {
            buses = getDemoData();
            document.getElementById('status-text').innerHTML = '<span class="demo-tag">DEMO</span>';
        }

        const activeFilter = {
            mza: document.getElementById('mza').checked,
            mobilis: document.getElementById('mobilis').checked,
            relobus: document.getElementById('relobus').checked,
            pks: document.getElementById('pks').checked
        };

        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = ''; 
        const currentIds = new Set();

        buses.forEach(bus => {
            const carrierId = identifyCarrier(bus.VehicleNumber);
            if (carrierId && activeFilter[carrierId]) {
                currentIds.add(bus.VehicleNumber);
                const carrier = CARRIERS[carrierId];
                const pos = [bus.Lat, bus.Lon];

                // Mapa
                if (markers[bus.VehicleNumber]) {
                    markers[bus.VehicleNumber].setLatLng(pos);
                } else {
                    markers[bus.VehicleNumber] = L.circleMarker(pos, {
                        radius: 8, fillColor: carrier.color, color: '#fff', weight: 2, fillOpacity: 0.9
                    }).addTo(map).bindPopup(`<b>Linia ${bus.Lines}</b><br>${carrier.name}<br>Nr: ${bus.VehicleNumber}`);
                }

                // Tabela
                const row = tableBody.insertRow();
                row.innerHTML = `
                    <td><b style="font-size:16px">${bus.Lines}</b></td>
                    <td>#${bus.VehicleNumber}</td>
                    <td><span class="badge" style="background:${carrier.color}">${carrier.name}</span></td>
                    <td style="color:#666">${parseFloat(bus.Lat).toFixed(3)}, ${parseFloat(bus.Lon).toFixed(3)}</td>
                    <td>${bus.Time.split(' ')[1] || bus.Time}</td>
                `;
                row.onclick = () => {
                    map.setView(pos, 16);
                    markers[bus.VehicleNumber].openPopup();
                };
            }
        });

        // Usuwanie nieaktywnych pojazdów
        Object.keys(markers).forEach(id => {
            if (!currentIds.has(id)) {
                map.removeLayer(markers[id]);
                delete markers[id];
            }
        });

        document.getElementById('update-timer').innerText = new Date().toLocaleTimeString();
    }

    // Odświeżanie co 10 sekund
    setInterval(updateData, 10000);
    updateData();
    
    // Obsługa filtrów
    document.querySelectorAll('input').forEach(i => i.onchange = updateData);
</script>
</body>
</html>
